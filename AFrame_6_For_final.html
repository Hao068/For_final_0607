<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>[MindAR] Alphabet Learning</title>

    <!-- 載入 A-Frame 和 MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        /* 播放按鈕 */
        #playBtn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;

            padding: 12px 24px;
            font-size: 18px;

            border: none;
            border-radius: 8px;

            background-color: #4CAF50;
            color: white;

            cursor: pointer;

            display: none;
        }

        /* 警告訊息 */
        #warningMsg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            z-index: 1000;

            background-color: rgba(0, 0, 0, 0.85);
            color: white;

            padding: 20px 30px;
            border-radius: 12px;

            font-size: 20px;
            text-align: center;

            display: none;
        }
    </style>
</head>

<body>

    <!-- 播放按鈕 -->
    <button id="playBtn">
        ▶ 播放影片與聲音
    </button>

    <!-- 音量提醒 -->
    <div id="warningMsg">
        請注意手機音量<br>
        避免影響他人
    </div>

    <!-- AR 場景 -->
    <a-scene
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiScanning: true;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <!-- 載入影片 -->
        <a-assets>
            <video
                id="introVid"
                src="A_Apple.mp4"
                preload="auto"
                playsinline
                webkit-playsinline
                crossorigin="anonymous">
            </video>
        </a-assets>

        <!-- 光源 -->
        <a-light type="ambient" intensity="1.5"></a-light>

        <!-- 相機 -->
        <a-camera look-controls="enabled: false"></a-camera>

        <!-- targetIndex:0 對應 letter_A -->
        <a-entity mindar-image-target="targetIndex: 0">

            <a-video
                id="videoEntity"
                src="#introVid"
                width="2.4"
                height="2.4"
                material="shader: flat"
                position="0 0 0">
            </a-video>

        </a-entity>

    </a-scene>

    <script>

        const video = document.querySelector('#introVid');
        const videoPlane = document.querySelector('#videoEntity');
        const targetEntity = document.querySelector('a-entity[mindar-image-target]');
        const playBtn = document.querySelector('#playBtn');
        const warningMsg = document.querySelector('#warningMsg');

        // 影片載入成功
        video.addEventListener('loadeddata', () => {
            console.log('影片載入成功');
        });

        // 影片載入失敗
        video.addEventListener('error', (e) => {
            console.log('影片載入失敗', e);
        });

        // 掃描到 letter_A
        targetEntity.addEventListener('targetFound', () => {
            console.log('Target Found');

            playBtn.style.display = 'block';
        });

        // 移開圖卡
        targetEntity.addEventListener('targetLost', () => {

            console.log('Target Lost');

            video.pause();
            video.currentTime = 0;

            playBtn.style.display = 'none';
            warningMsg.style.display = 'none';
        });

        // 按下播放按鈕
        playBtn.addEventListener('click', () => {

            // 隱藏按鈕
            playBtn.style.display = 'none';

            // 顯示提醒
            warningMsg.style.display = 'block';

            // 2秒後開始播放
            setTimeout(async () => {

                warningMsg.style.display = 'none';

                try {

                    video.currentTime = 0;

                    await video.play();

                    console.log('影片開始播放');

                } catch (err) {

                    console.log('播放失敗：', err);

                }

            }, 2000);

        });

        // 點擊影片可暫停/繼續播放
        videoPlane.addEventListener('click', () => {

            if (video.paused) {

                video.play();

            } else {

                video.pause();

            }

        });

    </script>

</body>
</html>
